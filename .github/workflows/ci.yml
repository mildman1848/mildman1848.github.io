name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate addons.xml
        run: xmllint --noout repo/addons.xml

      - name: Validate addons.xml.md5
        shell: bash
        run: |
          set -euo pipefail
          expected="$(md5sum repo/addons.xml | awk '{print $1}')"
          actual="$(tr -d '\n\r' < repo/addons.xml.md5)"
          test "$expected" = "$actual"
