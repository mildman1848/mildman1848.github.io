name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate addons.xml
        run: xmllint --noout repo/addons.xml

      - name: Validate addons.xml.md5
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          xml_path = Path("repo/addons.xml")
          md5_path = Path("repo/addons.xml.md5")

          normalized = xml_path.read_bytes().replace(b"\r\n", b"\n").replace(b"\r", b"\n")
          expected = hashlib.md5(normalized).hexdigest()
          actual = md5_path.read_text(encoding="utf-8").strip()

          if expected != actual:
              raise SystemExit(
                  "addons.xml.md5 mismatch: expected %s, found %s" % (expected, actual)
              )
          PY
